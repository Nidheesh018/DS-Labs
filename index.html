<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DS-lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h2 { text-align: center; font-weight: 600; letter-spacing: -1px; margin-bottom: 1.5rem; }

        .algo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-bottom: 2rem;
        }

        .algo-checkbox { display: none; }
        .algo-label {
            display: block;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .algo-checkbox:checked + .algo-label {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #000;
            font-weight: 600;
            border-color: transparent;
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .input-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: #94a3b8; }
        
        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #0f172a;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
    <script>
        function limitSelection(checkbox) {
            let checked = document.querySelectorAll("input[name='algo']:checked");
            if (checked.length > 3) {
                alert("Please select a maximum of 3 algorithms for side-by-side comparison.");
                checkbox.checked = false;
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <h2>DS-lab <style="color: var(--primary)></style></h2>
        <form method="POST" action="/compare">
            <div class="algo-grid">
                {% for algo in ["bubble", "selection", "insertion", "merge", "quick", "heap", "shell", "counting", "radix", "bucket"] %}
                <div>
                    <input type="checkbox" name="algo" value="{{algo}}" id="{{algo}}" class="algo-checkbox" onclick="limitSelection(this)">
                    <label for="{{algo}}" class="algo-label">{{algo|capitalize}}</label>
                </div>
                {% endfor %}
            </div>

            <div class="input-group">
                <label>Array Size</label>
                <input type="number" name="size" placeholder="e.g. 10" required>
            </div>

            <div class="input-group">
                <label>Array Elements (comma separated)</label>
                <input type="text" name="array" placeholder="12, 45, 2, 8, 33..." required>
            </div>

            <button type="submit">Analyze & Visualize</button>
        </form>
    </div>
</body>
</html>
