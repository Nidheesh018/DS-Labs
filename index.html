<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DS-Labs | Algorithm Workbench</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0b1120; --card: #1e293b; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 50px; margin: 0; }
        
        .workbench { background: var(--card); padding: 35px; border-radius: 20px; width: 700px; border: 1px solid #334155; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        .project-title { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .project-title span { color: #94a3b8; font-weight: 300; }

        /* Navigation Tabs */
        .tab-nav { display: flex; gap: 10px; margin-bottom: 25px; background: #0f172a; padding: 5px; border-radius: 12px; }
        .tab-btn { 
            flex: 1; padding: 12px; cursor: pointer; border: none; background: none; 
            color: #94a3b8; font-weight: 600; border-radius: 8px; transition: 0.2s;
        }
        .tab-btn.active { background: var(--accent); color: #0b1120; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: slideUp 0.4s ease; }

        /* Inputs */
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #94a3b8; margin-bottom: 8px; }
        input[type="text"], input[type="number"] { 
            width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #334155; 
            background: #0f172a; color: white; box-sizing: border-box; font-size: 15px;
        }

        .algo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .algo-item { 
            background: #1e293b; padding: 12px; border-radius: 8px; display: flex; 
            align-items: center; gap: 12px; border: 1px solid #334155; cursor: pointer; transition: 0.2s;
        }
        .algo-item:hover { border-color: var(--accent); }
        
        .analyze-btn { 
            width: 100%; padding: 18px; background: var(--accent); border: none; 
            border-radius: 12px; font-weight: 800; cursor: pointer; color: #0b1120; 
            margin-top: 30px; text-transform: uppercase; letter-spacing: 2px;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="workbench">
        <div class="project-title">DS-Labs <span>| Workbench</span></div>
        
        <form method="POST" action="/compare">
            <div class="input-group">
                <label>Dataset (Numbers separated by commas)</label>
                <input type="text" name="array" value="23, 1, 45, 12, 7, 33, 19" required>
            </div>

            <div class="tab-nav">
                <button type="button" class="tab-btn active" onclick="switchTab(event, 'sort-section')">SORTING</button>
                <button type="button" class="tab-btn" onclick="switchTab(event, 'search-section')">SEARCHING</button>
            </div>

            <!-- SORTING CONTENT -->
            <div id="sort-section" class="tab-content active">
                <label>Select Sorting Engines</label>
                <div class="algo-grid">
                    {% for a in ["bubble", "selection", "insertion", "merge", "quick", "heap", "shell", "counting", "radix", "bucket"] %}
                    <label class="algo-item">
                        <input type="checkbox" name="algo" value="{{a}}"> {{a|capitalize}}
                    </label>
                    {% endfor %}
                </div>
            </div>

            <!-- SEARCHING CONTENT -->
            <div id="search-section" class="tab-content">
                <label>Select Search Method</label>
                <div class="algo-grid" style="margin-bottom: 20px;">
                    <label class="algo-item"><input type="checkbox" name="algo" value="linear"> Linear Search</label>
                    <label class="algo-item"><input type="checkbox" name="algo" value="binary"> Binary Search</label>
                </div>
                <div class="input-group">
                    <label>Target Value</label>
                    <input type="number" name="target" placeholder="Enter value to locate">
                </div>
            </div>

            <button type="submit" class="analyze-btn">Initialize Analysis</button>
        </form>
    </div>

    <script>
        function switchTab(evt, sectionId) {
            const contents = document.querySelectorAll('.tab-content');
            const buttons = document.querySelectorAll('.tab-btn');
            
            contents.forEach(c => c.classList.remove('active'));
            buttons.forEach(b => b.classList.remove('active'));
            
            document.getElementById(sectionId).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
