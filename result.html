<!DOCTYPE html>
<html>
<head>
    <title>DS-LAB | Results</title>
    <style>
        :root { --accent: #00d2ff; --bg: #0b1120; --card: #1e293b; }
        body { background: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; padding: 40px; margin: 0; }
        .res-card { background: var(--card); padding: 30px; border-radius: 16px; margin-bottom: 24px; border: 1px solid #334155; position: relative; }
        
        .action-btn { 
            position: absolute; top: 20px; right: 20px; 
            background: #334155; border: none; color: #94a3b8; 
            padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 11px;
            text-transform: uppercase; font-weight: bold;
        }
        .action-btn:hover { background: var(--accent); color: #000; }

        .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .output-box { 
            font-family: 'Courier New', monospace; color: var(--accent); background: #000; 
            padding: 15px; border-radius: 8px; margin-top: 10px; word-break: break-all;
            font-size: 1.2rem; min-height: 28px;
        }
        
        .complexity-box { display: flex; gap: 12px; margin-top: 20px; border-top: 1px solid #334155; padding-top: 20px; }
        .tc { font-size: 12px; padding: 5px 12px; border-radius: 6px; background: #0f172a; border: 1px solid transparent; }
        .highlight { border: 1px solid var(--accent); color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 8px;">Comparison Results</h2>
    <p style="margin-top: 0; color: #94a3b8;">Original Input: {{ original }}</p>

    {% for r in results %}
    <div class="res-card">
        <button class="action-btn" onclick='visualize("{{ r.name }}", {{ r.output | tojson | safe }})'>Sort</button>
        
        <div class="label">Algorithm</div>
        <div style="font-size: 28px; font-weight: 800; margin-bottom: 15px;">{{ r.name }}</div>

        <div style="display: flex; gap: 60px;">
            <div>
                <div class="label">Time Taken</div>
                <div style="color: var(--accent); font-weight: bold; margin-top: 8px;">{{ r.time }} sec</div>
            </div>
            <div style="flex: 1;">
                <div class="label">Result / Output</div>
                <div class="output-box" id="box-{{ r.name }}">{{ r.output }}</div>
            </div>
        </div>

        <div class="complexity-box">
            <div class="tc {% if r.current_case == 'best' %}highlight{% endif %}">Best Case: {{ r.best }}</div>
            <div class="tc {% if r.current_case == 'avg' %}highlight{% endif %}">Avg Case: {{ r.avg }}</div>
            <div class="tc {% if r.current_case == 'worst' %}highlight{% endif %}">Worst Case: {{ r.worst }}</div>
        </div>
    </div>
    {% endfor %}

    <script>
    function visualize(algoName, resultData) {
        const box = document.getElementById(`box-${algoName}`);
        box.innerHTML = "";
        
        if (Array.isArray(resultData)) {
            resultData.forEach((val, i) => {
                setTimeout(() => {
                    const span = document.createElement("span");
                    span.innerText = val + (i < resultData.length - 1 ? ", " : "");
                    span.style.opacity = "0";
                    span.style.transition = "opacity 0.2s";
                    box.appendChild(span);
                    setTimeout(() => { span.style.opacity = "1"; }, 10);
                }, i * 150);
            });
        } else {
            box.innerText = resultData; // For search strings
        }
    }
    </script>
</body>
</html>
